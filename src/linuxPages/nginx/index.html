<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/components/css/index.css" />
    </head> 
    <body>
        <navigation-bar></navigation-bar>
	<div class="grid grid-cols-[1fr_62vw_1fr] gap-x-4">
		<roof-area class="w-full col-span-full"></roof-area>
		<wall-area class=" col-[2] " id="article"></wall-area>
		<foundation-area class=" w-full col-span-full "></foundation-area>
	</div>
        <footer-area></footer-area>
        <script type="module" src="/components/footer/footer.js"></script>
        <script type="module" src="/components/navigationBar/navigationBar.js"></script>
       	<script type="module" src="/components/house/roof.js"></script>
       	<script type="module" src="/components/house/wall.js"></script>
       	<script type="module" src="/components/house/foundation.js"></script>
        <script type="module">
            const html = `
                1.安装
                启用 EPEL
                sudo dnf install -y epel-release
                安装 Nginx
                sudo dnf install -y nginx
                2.启动
                sudo systemctl start nginx
                3.验证是否安装成功
                sudo nginx -v
                4.备注
                安装目录 /etc/nginx
                配置文件 /etc/nginx/nginx.conf
                测试配置文件合法sudo nginx -t
                重启nginx sudo nginx -s reload
                5.配置文件解释
                    user nginx;
                    worker_processes auto;
                    error_log /var/log/nginx/error.log;
                    pid /run/nginx.pid;

                    include /usr/share/nginx/modules/*.conf;

                    events {
                        worker_connections 1024;
                    }

                    http {
                        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                                        '$status $body_bytes_sent "$http_referer" '
                                        '"$http_user_agent" "$http_x_forwarded_for"';

                        access_log  /var/log/nginx/access.log  main;
                        #启用 零拷贝（zero-copy） 方式发送文件。
                        #不经过用户态（Nginx 进程）
                        #直接由 内核把磁盘文件 → 网卡
                        #减少 CPU 使用、提高大文件传输性能
                        sendfile            on;
                        #告诉 TCP 尽量等数据“凑满”再发送一个包，减少包数量，提高效率。
                        tcp_nopush          on;
                        #告诉 TCP 不要等待数据“凑满”一个包就立即发送，适合小数据包的实时传输。
                        tcp_nodelay         on;
                        #HTTP 长连接保持时间（秒）
                        keepalive_timeout   65;
                        #控制 MIME 类型哈希表的大小
                        types_hash_max_size 4096;
                        
                        #用于配置文件的默认 MIME 类型，MIME 类型用于告诉浏览器如何处理不同类型的文件。
                        include             /etc/nginx/mime.types;
                        #当浏览器请求一个文件时，如果服务器无法确定该文件的 MIME 类型，nginx 将使用 default_type 指定的 MIME 类型作为默认值。这通常用于处理未知类型的文件，确保浏览器能够正确处理它们。
                        #application/octet-stream 是一种通用的 MIME 类型，表示二进制数据。
                        default_type        application/octet-stream;

                        include /etc/nginx/conf.d/*.conf;
                        #传给浏览器的文件默认字符集
                        charset utf-8;
                        #字符集应用范围
                        charset_types
                                text/plain
                                text/css
                                text/javascript
                                application/javascript
                                application/json
                                application/xml;
                        server {
                                #SSL 默认访问端口号为 443
                                listen 443 ssl; 
                                #请填写绑定证书的域名
                                server_name xxx.com; 
                                #请填写证书文件的相对路径或绝对路径
                                ssl_certificate xxx.crt; 
                                #请填写私钥文件的相对路径或绝对路径
                                ssl_certificate_key xxx.key; 
                                ssl_session_timeout 5m;
                                #请按照以下协议配置
                                ssl_protocols TLSv1.2 TLSv1.3; 
                                #请按照以下套件配置，配置加密套件，写法遵循 openssl 标准。
                                ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE; 
                                ssl_prefer_server_ciphers on;

                                #直接访问xxx.com 会返回/var/www/xxx/index.html
                                root /var/www/xxx;
                                index index.html;
                                #当访问xxx.com/abc时会返回/var/www/abc/index.html
                                location /abc {
                                        root /var/www;
                                }
                        }
                        server {
                                #SSL 默认访问端口号为 443
                                listen 443 ssl; 
                                #请填写绑定证书的域名
                                server_name zzz.xxx.com; 
                                #请填写证书文件的相对路径或绝对路径
                                ssl_certificate xxx.crt; 
                                #请填写私钥文件的相对路径或绝对路径
                                ssl_certificate_key xxx.key; 
                                ssl_session_timeout 5m;
                                #请按照以下协议配置
                                ssl_protocols TLSv1.2 TLSv1.3; 
                                #请按照以下套件配置，配置加密套件，写法遵循 openssl 标准。
                                ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE; 
                                ssl_prefer_server_ciphers on;
                                
                                #当访问zzz.xxx.com/platform/时会返回/var/www/bbb/public/目录下的文件
                                location /platform/ {
                                        alias /var/www/bbb/public/;
                                        index index.html;
                                }
                                #当访问zzz.xxx.com/assets/时会返回/var/www/aaa/assets/目录下的文件
                                location /assets/ {
                                        root /var/www/aaa;
                                }
                                #当请求zzz.xxx.com/api/时会被反向代理到localhost:12345上，变成请求localhost:12345/api/
                                location /api/ {
                                        proxy_pass http://localhost:12345;
                                }
                                #允许上传文件最大2m，超过会返回413 Request Entity Too Large错误
                                client_max_body_size 2m;
                        }
                    }
            `
            const css =''
            const js = ``;
            const code = {
                '':{js,css,html}
            }
            document.querySelector("#article").content=code;
        </script>
    </body>
</html>
